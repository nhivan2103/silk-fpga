name: Silk EDA Pipeline

on:
  push:
    # Chỉ kích hoạt khi có thay đổi trong thư mục generic
    paths:
      - 'generic/rtl/**'
      - 'generic/tb/**'
      - 'generic/config.txt'
  pull_request:
    paths:
      - 'generic/rtl/**'
      - 'generic/tb/**'
      - 'generic/config.txt'

jobs:
  run_eda_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền commit ngược lại cho bot
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull Silk EDA Image
        run: docker pull huyatieo/silk-eda:latest

      - name: Chạy Pipeline
        run: |
          echo "=== KÍCH HOẠT SILK EDA ==="
          
          # Mount thư mục generic vào Docker Container
          docker run --rm -v "${{ github.workspace }}/generic:/workspace" huyatieo/silk-eda:latest
          
          # Chuyển vào thư mục con generic để gom sản phẩm đầu ra
          cd generic
          mkdir -p .results
          mv *.svg *.md sim/*.vcd .results/ 2>/dev/null || true

      - name: Auto-Commit Kết Quả Lên Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate EDA reports and SVGs (generic folder)"
          file_pattern: 'generic/.results/*'

      - name: Tạo Báo Cáo Trực Quan (Job Summary)
        if: always()
        run: |
          REPO_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
          
          cd generic
          
          echo "# 📊 Báo Cáo Phân Tích Silk EDA" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "config.txt" ]; then
            TOP_MODULE=$(grep "^TOP_MODULE" config.txt | awk -F'=' '{print $2}' | tr -d ' ' | tr -d '\r')
          else
            TOP_MODULE="unknown"
          fi
          
          echo "## 1. Sơ Đồ Module" >> $GITHUB_STEP_SUMMARY
          if [ -f ".results/module_${TOP_MODULE}.svg" ]; then
             # Trỏ URL ảnh raw vào thư mục generic
             echo "![Module Symbol](${REPO_URL}/generic/.results/module_${TOP_MODULE}.svg)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "## 2. RTL Schematic" >> $GITHUB_STEP_SUMMARY
          if [ -f ".results/schematic_${TOP_MODULE}.svg" ]; then
             echo "![RTL Schematic](${REPO_URL}/generic/.results/schematic_${TOP_MODULE}.svg)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "## 3. Thông số I/O" >> $GITHUB_STEP_SUMMARY
          if [ -f ".results/module_docs.md" ]; then
            tail -n +3 .results/module_docs.md >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "> 💡 **Mẹo:** Tải file \`.vcd\` trong thư mục \`generic/.results\` để xem sóng mô phỏng bằng VCDrom hoặc Surfer." >> $GITHUB_STEP_SUMMARY
